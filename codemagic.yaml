workflows:
  ios-testflight:
    name: GoOuts Lead — iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      flutter: stable
      xcode: latest
      # ios_signing tells Codemagic to use the connected Developer Portal
      # integration ("Codemagic Admin" key) to fetch the correct distribution
      # certificate + App Store provisioning profile automatically.
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.goouts.lead

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      # 1. Fetch Dart/Flutter dependencies
      - name: Get Flutter packages
        script: |
          flutter pub get

      # 2. Bump the iOS build number.
      #    We add 100 to Codemagic's internal counter so automatic builds
      #    never clash with manually pushed build numbers (1–99).
      - name: Set iOS build number
        script: |
          BUILD_NUM=$((100 + $BUILD_NUMBER))
          echo "iOS build number → $BUILD_NUM"
          cd ios && agvtool new-version -all $BUILD_NUM

      # 3. Compile the release IPA for App Store / TestFlight.
      #    ios_signing above has already installed the cert + profile and
      #    written export_options.plist to $HOME.
      - name: Build iOS IPA
        script: |
          flutter build ipa \
            --release \
            --export-options-plist=$HOME/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
