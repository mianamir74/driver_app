name: iOS Live Debug Session

# Manual-only — never runs on push, so it can't interfere with the normal
# TestFlight pipeline. Opens a live terminal session on a real macOS runner
# (with Xcode + iOS Simulator) so the OTP-Continue crash can be reproduced
# and inspected with real tools (Instruments / memory graph / lldb) instead
# of guessing from Jetsam logs alone.
on:
  workflow_dispatch:

jobs:
  live-debug:
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Show Xcode + Simulator info
        run: |
          xcodebuild -version
          xcrun simctl list devices available

      - name: Start live debug session (SSH into this macOS runner)
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: false
        timeout-minutes: 55
