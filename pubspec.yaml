name: driver_app
description: Goouts driver app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.11.0
  firebase_crashlytics: ^5.2.4
  firebase_auth: ^6.5.4
  cloud_firestore: ^6.6.0
  firebase_messaging: ^16.0.0
  firebase_storage: ^13.0.0
  go_router: ^17.1.0
  image_picker: ^1.2.1
  intl: ^0.20.2
  url_launcher: ^6.3.2
  shared_preferences: ^2.5.5
  smooth_page_indicator: ^2.0.1
  gallery_saver_plus: ^3.2.9
  http: ^1.2.0
  auto_size_text: ^3.0.0
  google_fonts: ^6.2.1
  # firebase_app_check: ^0.4.2  # removed — DeviceCheck not configured

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo/virtual_card_ios.png"
  remove_alpha_ios: true
  adaptive_icon_background: "assets/logo/virtual_card.png"
  adaptive_icon_foreground: "assets/logo/virtual_card.png"
  min_sdk_android: 21
  web:
    generate: false

flutter:
  uses-material-design: true

  assets:
    - assets/intro/
    - assets/logo/

  fonts:
    - family: Helvetica
      fonts:
        - asset: assets/fonts/helvetica-light-587ebe5a59211.ttf
          weight: 300
        - asset: assets/fonts/Helvetica.ttf
          weight: 400
        - asset: assets/fonts/Helvetica-Bold.ttf
          weight: 700
